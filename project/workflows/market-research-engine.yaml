name: archflow_e2_market_research_engine
status: planned_report_only
runtime: langgraph_controlled_research_workflow
purpose: >
  Convert the E2 market-research phase into a bounded evidence engine:
  account universe, public signals, pain scoring, role verification,
  message synthesis, learning loop, and AF Review.

primary_icp_hypothesis:
  canonical_source: project/knowledge/audience/icp-knowledge-continuity.md
  segment: product_led_b2b_saas_knowledge_continuity
  profile: "30-75 employee horizontal product-led B2B SaaS; Series A to early B is directional; Head/VP Product or CPO is the buyer hypothesis and must be verified per forcing moment"
  first_offer: product_knowledge_reliability_setup
  forcing_moments:
    - enterprise_rfp_or_questionnaire
    - onboarding_or_hiring_wave
    - key_person_departure
    - ai_agent_context_rework
    - chronic_retrieval
  later_or_adjacent_segments:
    - unresolved_80_to_100_employee_transition
    - regulated_verticals_after_compliance_architecture
    - mature_enterprise_knowledge_or_product_ops
  title_exclusions:
    - project_manager
    - pmo

stages:
  hypothesis:
    owner_agent: af_research
    output: hypothesis_memo_and_exclusion_rules
    mode: sequential
  account_universe:
    owner_agent: af_tools
    output: deduplicated_account_table
    mode: parallel_allowed
  public_signal_pass:
    owner_agent: af_research
    output: company_evidence_cards
    mode: parallel_allowed
    parallel_branches:
      - company_website_parser
      - job_signal_collector
      - review_miner
      - social_language_miner
      - competitor_gap_mapper
  pain_scoring:
    owner_agent: af_research
    output: scored_shortlist
    mode: sequential_merge
  role_verification:
    owner_agent: af_tools
    output: verified_role_map
    mode: sequential_reviewed
  message_synthesis:
    owner_agent: af_copy
    output: forcing_moment_message_and_claim_table
    mode: sequential_reviewed
  channel_preparation:
    owner_agent: af_abm_channel
    output: target_channel_message_and_action_packet
    mode: sequential_no_send
  fact_check_gate:
    owner_agent: af_review
    output: approved_repair_or_blocked_claim_target_channel_action_packet
    mode: sequential_blocking
  owner_action_pause:
    owner_agent: external_action_role
    output: owner_approval_or_no_action_receipt
    mode: external_action_disabled_by_default
  learning_loop:
    owner_agent: af_growth_evidence
    output: stage_event_objection_and_payment_evidence_packet
    mode: report_only
  knowledge_promotion:
    owner_agent: af_knowledge
    output: reviewed_audience_delta_and_readback
    mode: sequential_reviewed

account_card_schema:
  account_id: stable_domain_id
  company_name: string
  domain: string
  segment_primary: string
  segment_secondary: string
  source_seed: string
  website_signal: string
  job_signal_score: integer_0_to_20
  linkedin_signal_summary: authorized_summary_only
  social_signal_summary: hypothesis_only
  pain_type: enterprise_answer_readiness_onboarding_continuity_departure_continuity_agent_context_rework_chronic_retrieval_artifact_production
  decision_roles: role_names_and_currentness_status
  offer_fit: product_knowledge_reliability_setup_agent_operating_system_or_defer
  evidence_grade: a_b_c_d
  risk_notes: string
  next_action: exclude_monitor_enrich_verify_people_draft_outreach_interview

scoring_model:
  pain_intensity: 25
  budget_proxy: 15
  trigger_event: 15
  strategic_fit: 15
  reachability: 10
  differentiation_gap: 10
  risk_penalty: -20

evidence_rules:
  minimum_independent_signals_before_outreach: 2
  social_only_claims: hypothesis
  decision_maker_currentness: verify_live_before_outreach
  private_profile_scraping: forbidden
  raw_private_lead_data_in_public_repo: forbidden
  public_signal_is_confirmed_forcing_moment: false
  project_manager_or_pmo_is_default_buyer: false
  product_ops_is_default_economic_buyer: false

tool_policy:
  allowed_now:
    - public_directories
    - company_websites
    - public_job_pages
    - public_reviews
    - authorized_linkedin_views
    - approved_search_queries
  gated_later:
    - tavily
    - exa
    - serpapi
    - google_custom_search
    - firecrawl
    - apify
    - playwright
    - browserless
    - clay
    - apollo
    - cognism
    - clearbit
    - people_data_labs
  rule: "Use only when legal, source boundaries, storage, rate limits, and AF Review approval are clear."

done_criteria:
  e2_0: tool_api_plan_source_boundaries_extraction_schema_loop_gate
  e2_1: approved_source_list_and_segment_data_model
  e2_2: evidence_cards_and_competitor_pain_map
  e2_3: product_team_icp_card
  e2_4: primary_icp_and_later_lanes
  e2_5: ten_to_fifteen_verified_targets_for_e6
