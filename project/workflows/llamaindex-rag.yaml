name: archflow_block1_rag
status: runtime_installed_approved_corpus_smoke_passed
runtime: llamaindex_python
official_docs_checked:
  - https://developers.llamaindex.ai/python/framework/getting_started/concepts/

purpose: >
  Connect agents and LLMs to approved project data. LlamaIndex owns bounded
  loading, indexing, retrieval, and source-grounded answers.

approved_corpus:
  include:
    - project/
    - history/
    - skills/
    - wiki/
  exclude:
    - .git/
    - project/.env.local
    - project/local/
    - raw/
    - source_exports/
    - secrets/
    - private/
    - tmp/

indexing_parameters:
  loader: simple_directory_reader
  document_language: english
  chunk_size: 800
  chunk_overlap: 120
  metadata_fields:
    - source_path
    - document_type
    - public_safety_status
    - updated_at
  persist_dir: project/local/rag_index
  persist_dir_git_status: ignored

retrieval_parameters:
  query_engine: approved_corpus_keyword_smoke_first
  similarity_top_k: 5
  response_mode: compact
  require_source_paths: true
  refuse_on_private_source: true

model_routing:
  primary_operator: codex_operator
  local_background_llm: hf.co/empero-ai/Qwythos-9B-Claude-Mythos-5-1M-GGUF:Q4_K_M
  fallback_local_llm: gemma4:e4b
  embedding_model: nomic-embed-text
  cloud_llm: not_configured
  observability: langsmith_configured_key_present_local_ignored_smoke_trace_submitted

outputs:
  retrieval_log: project/outputs/templates/retrieval-log.md
  source_inventory: project/outputs/templates/source-inventory.md
  context_digest: project/outputs/templates/context-digest.md
  smoke_summary_local: project/local/rag_index/approved-corpus-summary.json
  smoke_script: project/scripts/llamaindex-approved-corpus.py

current_limitations:
  - Vector embeddings are not generated yet.
  - First proof uses deterministic local keyword retrieval over LlamaIndex documents.
  - Only sanitized public files are approved for indexing by default.

future_vector_store:
  candidate: turbovec
  integration_rule: use_under_llamaindex_adapter_only
  status: deferred_until_source_ids_embeddings_and_metadata_exist
  required_before_pilot:
    - stable_source_id_doc_id_chunk_id
    - fixed_embedding_model_and_dimensions
    - public_private_allowlist_filters
    - twenty_query_retrieval_benchmark
    - ignored_local_persist_dir
  fallback: existing_llamaindex_store
