name: archflow_block1_rag
status: runtime_installed_bounded_hybrid_retrieval_available
runtime: llamaindex_python
official_docs_checked:
  - https://developers.llamaindex.ai/python/framework/getting_started/concepts/

purpose: >
  Connect agents and LLMs to approved project data. LlamaIndex owns bounded
  loading, indexing, retrieval, and source-grounded answers.

context_method:
  cag_role: >
    CAG is Controlled Context Assembly Generation. It assembles stable project
    rules, role/skill governance, architecture boundaries, E1-E8 state, and
    gated claims before task-specific retrieval.
  rag_role: >
    RAG is task-specific evidence retrieval into a context capsule. It must
    return source paths and metadata or the result is not accepted as evidence.
  capsule_schema: project/context/context-capsule.schema.json
  source_boundary_policy: project/context/retrieval/source-boundary-policy.yaml
  audience_source_routing: project/knowledge/audience/source-routing.yaml

approved_corpus:
  include:
    - project/
    - history/
    - skills/
    - wiki/
  exclude:
    - .git/
    - project/.env.local
    - project/local/
    - raw/
    - source_exports/
    - secrets/
    - private/
    - tmp/

indexing_parameters:
  loader: simple_directory_reader
  document_language: english
  chunk_size: 800
  chunk_overlap: 120
  metadata_fields:
    - source_path
    - document_type
    - public_safety_status
    - updated_at
    - authority_state
    - superseded_by
  persist_dir: project/local/rag_index
  persist_dir_git_status: ignored

retrieval_parameters:
  query_engine: approved_corpus_hybrid
  query_mode: hybrid
  vector_top_k: 5
  lexical_top_k: 5
  rerank_top_k: 5
  fallback_to_lexical: true
  similarity_top_k: 5
  response_mode: compact
  require_source_paths: true
  refuse_on_private_source: true
  deterministic_smoke_mode: lexical
  no_source_path_means_no_evidence: true
  canonical_source_boost: true
  superseded_source_penalty: true
  contradictory_current_claim: return_gap_and_request_reconciliation

model_routing:
  primary_operator: codex_operator
  local_background_llm: hf.co/empero-ai/Qwythos-9B-Claude-Mythos-5-1M-GGUF:Q4_K_M
  fallback_local_llm: gemma4:e4b
  embedding_model: nomic-embed-text
  cloud_llm: not_configured
  observability: langsmith_configured_key_present_local_ignored_smoke_trace_submitted

outputs:
  retrieval_log: project/outputs/templates/retrieval-log.md
  source_inventory: project/outputs/templates/source-inventory.md
  context_digest: project/outputs/templates/context-digest.md
  smoke_summary_local: project/local/rag_index/approved-corpus-summary.json
  smoke_script: project/scripts/llamaindex-approved-corpus.py
  benchmark_script: project/scripts/llamaindex-rag-benchmark.py
  benchmark_summary_local: project/local/rag_index/approved-corpus-benchmark.json
  context_capsule: project/context/capsules/<run-id>.json

current_limitations:
  - Vector embeddings run only when the configured local embedder is already available.
  - Deterministic lexical retrieval remains the required fallback and smoke path.
  - Only sanitized public files are approved for indexing by default.
  - Full vector defaulting requires a passing 20-query retrieval benchmark.
  - Retrieval does not create durable memory. Reviewed conclusions must be promoted through WikiLLM rules.
  - Retrieval must not include private raw source, secrets, ignored local runtime files, account IDs, deployment IDs, screenshots, or absolute local paths.

benchmark_requirements:
  fixed_query_count: 20
  minimum_hybrid_recall_at_k: 0.70
  no_regression_against_lexical: true
  source_path_filtering_required: true
  pass_required_before_full_vector_default: true

future_vector_store:
  candidate: turbovec
  integration_rule: use_under_llamaindex_adapter_only
  status: deferred_until_benchmark_stable_ids_embeddings_metadata_and_filters_pass
  required_before_pilot:
    - stable_source_id_doc_id_chunk_id
    - fixed_embedding_model_and_dimensions
    - public_private_allowlist_filters
    - twenty_query_retrieval_benchmark
    - ignored_local_persist_dir
  fallback: existing_llamaindex_store
