name: archflow_combined_knowledge_operations
status: configured

purpose: >
  Define how public WikiLLM, optional Obsidian/Second Brain mirror, future
  Graphify output, future Nexus bridge, LlamaIndex RAG, CrewAI, LangGraph,
  LangSmith, and Codex operate together.

operator:
  primary: codex_operator
  responsibilities:
    - approve_sensitive_actions
    - run_public_safety_scan
    - edit_public_files
    - publish_to_git
    - record_wikillm_runs

knowledge_layers:
  wikillm_public:
    status: active
    root: wiki/
    role: canonical_public_agent_memory
    writes:
      - runs
      - decisions
      - issues
      - memory
      - insights

  obsidian_second_brain:
    status: planned_sanitized_mirror_only
    root: project/reference/obsidian/
    role: human_strategy_and_semantic_notes
    rule: export_or_summarize_public_safe_notes_only

  graphify:
    status: planned_after_runtime_code_exists
    root: project/reference/graphify/
    role: generated_structure_map
    rule: graph_public_repo_only

  loop_engineering:
    status: active_contract
    root: project/loops/
    role: loop_state_attempt_caps_budget_maker_checker_and_stop_conditions
    rule: default_l1_report_only

  nexus:
    status: planned_after_vault_target_is_clear
    role: live_obsidian_bridge
    rule: discover_schema_before_use_and_never_write_secrets

runtime_layers:
  langgraph:
    status: runtime_installed_smoke_passed
    role: workflow_state_controller
    config: project/workflows/langgraph-controller.yaml

  llamaindex:
    status: runtime_installed_bounded_hybrid_retrieval_available
    role: approved_corpus_hybrid_retrieval_not_durable_store
    config: project/workflows/llamaindex-rag.yaml

  crewai:
    status: runtime_installed_config_import_passed
    role: agent_role_execution
    config: project/workflows/crewai-crew.yaml

  langsmith:
    status: configured_key_present_local_sdk_installed_smoke_trace_submitted
    role: trace_observability
    project_id: masked_langsmith_project_id
    local_env_file: project/.env.langsmith.local

  ollama:
    status: active
    role: local_model_execution
    active_model: hf.co/empero-ai/Qwythos-9B-Claude-Mythos-5-1M-GGUF:Q4_K_M
    fallback_model: gemma4:e4b

  cognee:
    status: deferred_until_e1_3_readback
    role: optional_operational_recall_and_knowledge_graph
    rule: approved_artifacts_only_and_never_replace_wikillm

  turbovec:
    status: deferred_until_benchmark_stable_chunk_ids_metadata_and_source_filters_pass
    role: optional_local_vector_store_under_llamaindex
    rule: ignored_local_index_with_source_filters_and_fallback

  mistral:
    status: disabled_until_credentials_source_approval_and_budget
    role: optional_quality_pass_for_sanitized_prd_research_and_copy
    rule: no_raw_private_inputs_and_af_review_after_output

execution_path:
  - codex_reads_wikillm
  - codex_reads_loop_contract
  - codex_checks_public_safety_boundary
  - langgraph_validates_source_packet
  - llamaindex_retrieves_approved_context
  - crewai_generates_role_outputs
  - langgraph_runs_review_gate
  - langsmith_records_trace_for_public_safe_runs
  - af_knowledge_updates_wikillm
  - codex_runs_pre_push_safety_scan
  - codex_pushes_to_git

hard_rules:
  - ignored_env_files_must_not_be_tracked
  - no_api_keys_in_git
  - no_private_links_in_git
  - no_local_absolute_paths_in_git
  - no_raw_private_inputs_in_git
  - graphify_and_llamaindex_use_public_or_sanitized_corpus_only
  - llamaindex_is_retrieval_layer_not_durable_knowledge_store
