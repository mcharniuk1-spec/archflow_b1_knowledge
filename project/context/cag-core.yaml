version: 2026-07-08-founder-meeting-v2
status: active_planning_context
purpose: >
  Stable ArchFlow context assembled before task-specific RAG retrieval and
  subagent prompting. This file is a compact control packet, not durable memory.

execution_boundary:
  role_runtime_rule: role_contracts_control_authority_named_runtimes_are_current_bindings_not_permanent_authority
  codex: current_local_executor_reviewer_file_editor_validator_integrator_binding
  hermes: current_planned_watchdog_controller_reviewer_binding_not_executor
  subagents: bounded_task_contracts_only
  af_review: public_safety_claim_support_runtime_boundary_gate
  self_review_rule: a_runtime_fulfilling_any_role_must_not_approve_its_own_high_risk_output

architecture:
  langgraph: path_state_routing_review_gates
  crewai: named_roles_and_task_sequence_proof_not_default_autonomous_runtime
  llamaindex: bounded_retrieval_not_memory
  wikillm: durable_reviewed_memory_after_promotion
  dashboard: operator_control_surface_not_primary_brain
  jarvis: provider_disabled_review_packet_surface_unless_approved

source_boundaries:
  approved_public_corpus:
    - project/
    - history/
    - skills/
    - wiki/
  forbidden_public_storage:
    - secrets
    - credentials
    - private_urls
    - local_absolute_paths
    - raw_private_exports
    - raw_transcripts
    - screenshots
    - account_ids
    - deployment_ids
    - personal_identifiers
  path_policy: repo_relative_paths_only_in_public_files

founder_method:
  service_core: customer_discovery_to_evidence_backed_prd_task_packet_kb_handoff
  discovery_methods:
    - jtbd
    - ninety_day_story
    - forty_five_minute_discovery_call
    - five_whys
    - customer_forces
    - current_alternatives
    - spec_to_tasks_logic
    - definition_of_done
    - dual_track_discovery_delivery
  service_offer_ladder:
    - Discovery Diagnostic
    - PRD Rescue Sprint
    - Monthly PRD/KB Operating Retainer

market_content_sales:
  primary_icp: b2b_saas_product_teams_50_500_employees_2_5_pms
  buyers:
    - Director Product
    - VP Product
    - Head of Product
    - Product Ops
    - senior PM leaders
  content_mix:
    static_educational_analytical: 70
    carousel_checklist_template: 20
    short_video_scripted_demo: 10
  demand_boundary: payment_or_firm_paid_intent_required_before_validated_demand_claim

approval_gates:
  require_owner_approval:
    - provider_activation
    - paid_tool_activation
    - secrets_or_env_changes
    - external_writeback
    - notion_mutation
    - linear_mirror
    - telegram_send
    - railway_action
    - git_push
    - deployment_or_production_promotion
    - figma_sync

loop_policy:
  max_attempts_per_task: 3
  stop_if_same_error_appears_twice: true
  require_evidence_before_completion: true
  stop_after_acceptance_criteria_met: true
