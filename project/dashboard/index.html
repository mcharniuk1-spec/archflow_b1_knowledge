<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ArchFlow Block 1 Operator Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Dashboard navigation">
        <div class="brand">
          <div class="brand-mark">AF</div>
          <div>
            <div class="brand-title">ArchFlow</div>
            <div class="brand-subtitle">Block 1 operator</div>
          </div>
        </div>
        <nav class="nav" id="nav"></nav>
        <div class="sidebar-status">
          <div class="status-dot"></div>
          <div>
            <strong>Local read-only mode</strong>
            <span>Generated from public project files.</span>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <h1>Operator Dashboard</h1>
            <p>Track the current LangGraph, CrewAI, LlamaIndex, WikiLLM, and LangSmith setup without making the dashboard the project brain.</p>
          </div>
          <div class="topbar-actions">
            <span class="pill" id="generatedAt">Loading data</span>
            <a class="button" href="../project-plan.md">Project plan</a>
          </div>
        </header>

        <section id="view" class="view" aria-live="polite"></section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
