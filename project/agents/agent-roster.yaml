      - review-mining
      - icp-scoring
    outputs:
      - account_evidence_cards
      - competitor_gap_matrix
      - pain_map
      - icp_scorecard
      - target_shortlist

  af_knowledge:
    title: AF Knowledge
    provider: codex_operator
    local_model: gemma4:e4b
    skills:
      - knowledge-base-update
      - task-handout
      - outquestions
      - sanitized-history-writing
      - source-boundary-control
      - agent-memory-candidate-writing
    outputs:
      - kb_update_packet
      - public_history_summary
      - memory_candidates

  af_copy:
    title: AF Copy
    provider: codex_operator
    local_model: gemma4:e4b
    skills:
      - source-grounded-copywriting
      - positioning-synthesis
      - content-planning
      - outreach-message-drafting
      - claim-status-check
    outputs:
      - positioning_variants
      - content_angles
      - outreach_drafts
      - proposal_copy

  af_gloomylord:
    title: GloomyLord
    provider: codex_operator
    local_model: none
    mode: internal_visual_reporting_sidecar
    skills:
      - public-reporting-gate
      - carousel-structure-design
      - evidence-labeling
      - dashboard-proof-card-design
    outputs:
      - reporting_template_pack
      - carousel_outline
      - visual_proof_cards

  af_review:
    title: AF Review
    provider: codex_operator
    local_model: gemma4:e4b
    skills:
      - public-safety-review
      - secret-and-path-scan
      - english-only-check
      - claim-status-check
      - outquestions
    outputs:
      - approval_status
      - blocked_items
      - required_edits

  af_publisher:
    title: AF Publisher
    provider: codex_operator
    local_model: none
    skills:
      - git-clean-repo-publication
      - github-remote-publication
      - publication-review-reporting
      - task-handout
      - outquestions
    outputs:
      - git_status
      - publication_review
      - release_notes

  yushchenko_model_efficiency_observer:
    title: Yushchenko Model Efficiency Observer
    provider: codex_automation
    local_model: none
    mode: recurring_model_and_token_use_observer
    schedule: every_five_hours
    skills:
      - model-usage-review
      - token-efficiency-audit
      - openrouter-routing-review
      - public-safety-review
      - task-handout
    reads:
      - project/config/model-routing.yaml
      - project/reports/2026-07-01-openrouter-model-routing-plan.md
      - project/agents/model-efficiency-advice.md
      - project/agents/model-efficiency-issues.md
      - project/live/communication/agent-communication-log.md
      - project/runs/
      - wiki/log.md
    writes:
      - project/runs/yushchenko-model-efficiency/
      - project/agents/model-efficiency-advice.md
      - project/agents/model-efficiency-issues.md
      - wiki/log.md
      - project/live/communication/agent-communication-log.md
    outputs:
      - model_efficiency_report
      - token_usage_summary
      - cost_waste_findings
      - routing_advice
      - open_issues
    rules:
      - report_actual_evidence_only
      - do_not_invent_token_or_cost_numbers
      - do_not_store_private_chat_destinations_or_tokens
      - telegram_summary_only_when_approved_sender_exists
      - openrouter_runtime_stays_disabled_without_explicit_approval

automation:
  archflow_evening_skill_and_hook_update:
    schedule: daily_evening
    schedule_time: "21:00"
    provider: codex_operator
    automation_id: archflow-evening-skill-and-hook-update
    skills:
      - evening-skill-registry-update
      - archflow-e1-runtime-guard
      - task-handout
      - outquestions
    target_files:
      - project/agents/skills-by-agent.md
      - project/agents/agent-roster.yaml
      - skills/skills-used.md
      - project/automation/archflow-public-evening-skill-and-hook-update.md
      - .codex/hooks.json
      - project/live/communication/agent-communication-log.md
  daily_skill_rag_retrospective:
    schedule: daily_evening
    schedule_time: "22:30"
    provider: codex_operator
    automation_id: daily-skill-rag-knowledge-review
    skills:
      - daily-public-project-review
      - task-handout
      - outquestions
    target_files:
      - project/automation/daily-skill-retrospective-and-rag-knowledge-review.md
      - project/agentic-stack.md
      - project/agents/skills-by-agent.md
      - skills/skills-used.md
      - wiki/memory.md
      - wiki/log.md
      - wiki/insights.md
      - project/live/communication/agent-communication-log.md
  yushchenko_model_efficiency_observer:
    schedule: every_five_hours
    provider: codex_app_cron
    automation_id: yushchenko-model-efficiency-observer
    status: active
    target_files:
      - project/runs/yushchenko-model-efficiency/
      - project/agents/model-efficiency-advice.md
      - project/agents/model-efficiency-issues.md
      - wiki/log.md

communication:
  active_channel: project/live/communication
  current_notice: project/live/communication/current-agent-notice.md
  live_log: project/live/communication/agent-communication-log.md
  pattern_change_log: project/live/communication/pattern-change-log.md
  rule: read_current_notice_and_append_starting_update_before_editing
