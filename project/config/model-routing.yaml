provider_mode: codex_auth_main

providers:
  codex_operator:
    status: active_as_primary_operator_runtime
    mode: codex_app
    auth_scope: codex_app_authenticated_tools
    exports_api_key: false
    use_for:
      - file_edits
      - approvals
      - public_safety_review
      - orchestration
      - final_outputs
      - github_publication
    github_publication:
      repository: mcharniuk1-spec/archflow_b1_knowledge
      verified_method: codex_operated_git_ssh
      local_https_push_status: blocked_missing_git_credentials
      ssh_push_status: verified

  ollama_local:
    status: service_started_qwythos_loads
    role: local_minor_background_tasks
    base_url_env: OLLAMA_BASE_URL
    chat_model_env: OLLAMA_CHAT_MODEL
    fallback_chat_model_env: OLLAMA_FALLBACK_CHAT_MODEL
    embedding_model_env: OLLAMA_EMBED_MODEL
    task_scope_env: OLLAMA_TASK_SCOPE
    default_chat_model: hf.co/empero-ai/Qwythos-9B-Claude-Mythos-5-1M-GGUF:Q4_K_M
    active_background_chat_model: hf.co/empero-ai/Qwythos-9B-Claude-Mythos-5-1M-GGUF:Q4_K_M
    fallback_chat_model: gemma4:e4b
    default_embedding_model: nomic-embed-text
    allowed_tasks:
      - draft_cleanup
      - public_text_summarization
      - local_registry_checks
      - non_final_background_classification
    checks:
      service_started: true
      inventory_contains_qwythos: true
      qwythos_loads: true
      qwythos_generates_text: true
      fallback_model_loads: true
    notes:
      - qwythos_smoke_test_required_manual_stop_after_verbose_generation

  cloud_api:
    status: not_configured
    allowed_only_after_approval: true
    env_names:
      - OPENAI_API_KEY
      - OPENAI_BASE_URL
      - MISTRAL_API_KEY
    optional_mistral_quality_pass:
      status: disabled_until_credentials_source_approval_and_budget
      draft_batch_model: mistral_small_current
      final_strategy_model: mistral_medium_current
      ocr_model: preflight_required_before_use
      allowed_inputs:
        - approved_context_digest
        - sanitized_research_summary
        - draft_prd_without_raw_private_sources
        - reviewed_task_matrix
        - approved_copy_brief
      forbidden_inputs:
        - raw_private_transcript
        - private_notion_export
        - credentials_or_env_files
        - unsanitized_client_material
        - private_profile_data
      required_metadata:
        - model_id
        - prompt_version
        - source_ids_used
        - budget_status
        - review_required

  langsmith_observability:
    status: configured_key_present_local_ignored_smoke_trace_submitted
    role: tracing_only_not_model_provider
    project_name: ArchFlow
    project_id: masked_langsmith_project_id
    endpoint_env: LANGSMITH_ENDPOINT
    tracing_env: LANGSMITH_TRACING
    api_key_env: LANGSMITH_API_KEY
    api_key_storage: project/.env.langsmith.local
    public_example: project/config/langsmith.env.example
    model_execution: ollama_local_only
    cloud_model_keys_allowed: false

routing:
  orchestration: codex_operator
  repository_publication: codex_operated_git_ssh
  observability: langsmith_observability
  public_safe_review: codex_operator
  final_client_output: codex_operator
  minor_background_tasks: ollama_local_qwythos
  future_high_quality_llm: cloud_api
  future_sanitized_mistral_quality_pass: cloud_api_after_explicit_approval
