  E2_research_engine:
    plan: [openai/gpt-5.4-pro, google/gemini-3.1-pro-preview, anthropic/claude-opus-4.7]
    execute: [qwen/qwen3.6-plus, z-ai/glm-5, perplexity/sonar-pro, deepseek/deepseek-v4-flash]
    review: [openai/gpt-5.4-pro, anthropic/claude-sonnet-4.6]
  E3_website_positioning:
    plan: [anthropic/claude-opus-4.7, openai/gpt-5.4-pro, google/gemini-3.1-pro-preview]
    execute: [moonshotai/kimi-k2-thinking, mistralai/codestral-2508, mistralai/mistral-medium-3.1]
    review: [anthropic/claude-sonnet-4.6, google/gemini-3-flash-preview]
  E4_content:
    plan: [anthropic/claude-opus-4.7, openai/gpt-5.4-pro]
