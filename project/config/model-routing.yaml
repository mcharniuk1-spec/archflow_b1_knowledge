    - prompt_tokens
    - output_tokens
    - cost_estimate
    - actual_or_estimated_cost
    - cost_currency
    - pricing_source
    - budget_cap
    - budget_remaining
    - decision
    - reviewer_model_id
    - human_gate_required
    - runtime_source
    - status
    - error_type

