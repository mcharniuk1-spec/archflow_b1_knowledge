    review: [anthropic/claude-sonnet-4.6, openai/gpt-5.4-pro]
  E7_payment_verdict:
    plan: [openai/gpt-5.4-pro, anthropic/claude-opus-4.7, google/gemini-3.1-pro-preview]
    execute: [qwen/qwen3.6-plus]
    review: [openai/gpt-5.4-pro, anthropic/claude-opus-4.7]

quality_gates:
  unsupported_model_id: refresh_openrouter_models_before_activation
  public_claim: at_least_two_sources_plus_frontier_review
  outreach: source_url_required_plus_safety_review_plus_human_approval
  memory_write: codex_review_plus_human_approval_for_sensitive_changes
  architecture_change: three_family_frontier_council_required
  bulk_research: execution_pool_first_then_sampled_frontier_review
  payment_verdict: openai_and_anthropic_review_required
  model_availability_failure: fall_back_to_capability_tier_not_unverified_alias
  provider_rate_limit_or_cost_spike: stop_or_downgrade_to_execution_pool_with_human_notice

budget_controls:
  default_mode: economical_until_escalation_threshold
  openrouter_hard_caps:
    daily_budget_usd: 5.00
    max_per_run_usd: 1.99
    rule: always_keep_each_run_under_2_usd
    warn_at_run_usd: 1.50
    stop_before_run_usd: 1.99
    stop_before_daily_usd: 5.00
    over_cap_behavior: stop_and_request_owner_approval
  frontier_council_quota:
    routine_run: zero
    substantial_strategy_run: one_to_three_calls_per_family
    payment_or_architecture_verdict: one_call_per_family_plus_final_codex_review
  execution_pool_quota:
    bulk_account_cards: cheap_models_first
    content_variants: cheap_models_first_then_sample_review
    code_drafts: code_execution_model_first_then_codex_review
  stop_conditions:
    - budget_cap_reached
    - run_cost_reaches_1_99_usd
    - daily_openrouter_cost_reaches_5_00_usd
    - repeated_low_confidence_outputs
    - provider_unavailable
    - source_boundary_unclear
    - human_approval_required

reliability_controls:
  retries:
    transient_provider_error: one_retry_then_fallback
    schema_validation_failure: one_repair_attempt_then_handoff_to_reviewer
    low_confidence_or_conflict: no_retry_escalate_to_checker
  timeouts:
    cheap_execution_call: short
    frontier_review_call: medium
    long_context_strategy_call: long_with_explicit_budget
  validation:
    structured_outputs: schema_parse_required
    research_outputs: source_ids_required
    outreach_outputs: public_signal_required
    memory_outputs: review_and_approval_required

logging:
  required_fields:
    - timestamp
    - timestamp_utc
    - run_id
    - epic_or_task
    - provider
    - model_id
    - model_role
    - prompt_version
    - source_ids_used
    - input_artifact
    - output_artifact
