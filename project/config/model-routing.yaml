provider_mode: codex_auth_main

providers:
  codex_operator:
    status: active_as_primary_operator_runtime
    mode: codex_app
    auth_scope: codex_app_authenticated_tools
    exports_api_key: false
    use_for:
      - file_edits
      - approvals
      - public_safety_review
      - orchestration
      - final_outputs
      - github_publication
    github_publication:
      repository: mcharniuk1-spec/archflow_b1_knowledge
      preferred_method: codex_github_connector
      local_https_push_status: blocked_missing_git_credentials

  ollama_local:
    status: service_started_with_qwythos_load_error
    role: local_minor_background_tasks
    base_url_env: OLLAMA_BASE_URL
    chat_model_env: OLLAMA_CHAT_MODEL
    fallback_chat_model_env: OLLAMA_FALLBACK_CHAT_MODEL
    embedding_model_env: OLLAMA_EMBED_MODEL
    task_scope_env: OLLAMA_TASK_SCOPE
    default_chat_model: hf.co/empero-ai/Qwythos-9B-Claude-Mythos-5-1M-GGUF:Q4_K_M
    active_background_chat_model: gemma4:e4b
    default_embedding_model: nomic-embed-text
    allowed_tasks:
      - draft_cleanup
      - public_text_summarization
      - local_registry_checks
      - non_final_background_classification
    checks:
      service_started: true
      inventory_contains_qwythos: true
      qwythos_loads: false
      fallback_model_loads: true
    next_repair_options:
      - re_pull_qwythos_model
      - replace_qwythos_with_supported_local_model
      - route_private_drafts_to_fallback_until_qwythos_is_fixed

  cloud_api:
    status: not_configured
    allowed_only_after_approval: true
    env_names:
      - OPENAI_API_KEY
      - OPENAI_BASE_URL
      - LANGSMITH_API_KEY

routing:
  orchestration: codex_operator
  repository_publication: codex_github_connector
  public_safe_review: codex_operator
  final_client_output: codex_operator
  minor_background_tasks: ollama_local_fallback_until_qwythos_fixed
  future_high_quality_llm: cloud_api
